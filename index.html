<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>وضع الشك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D0D0D;
    --red: #E50914;
    --blue: #1E90FF;
    --green: #2ECC71;
    --purple: #9B59B6;
    --white: #FFFFFF;
    --gray: #B3B3B3;
    --card: #161616;
    --border: #2a2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(229,9,20,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(30,144,255,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .screen { display: none; min-height: 100vh; padding: 20px; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ===== LOGO ===== */
  .logo {
    text-align: center;
    margin: 30px 0 10px;
  }
  .logo-icon { font-size: 52px; display: block; filter: drop-shadow(0 0 20px rgba(229,9,20,0.6)); animation: pulse-glow 2s ease-in-out infinite; }
  .logo-title {
    font-size: 38px;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #fff 0%, #E50914 50%, #9B59B6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
  }
  .logo-sub { font-size: 13px; color: var(--gray); letter-spacing: 2px; margin-top: 4px; }

  @keyframes pulse-glow {
    0%,100% { filter: drop-shadow(0 0 20px rgba(229,9,20,0.5)); transform: scale(1); }
    50% { filter: drop-shadow(0 0 35px rgba(229,9,20,0.9)); transform: scale(1.05); }
  }

  /* ===== CARDS ===== */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 420px;
    margin: 10px 0;
  }

  .card-title {
    font-size: 14px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  /* ===== INPUTS ===== */
  input[type="text"], input[type="number"] {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--white);
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
    direction: rtl;
  }
  input:focus { border-color: var(--blue); }

  /* ===== BUTTONS ===== */
  .btn {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s ease;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
  }
  .btn::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.08); opacity: 0; transition: opacity 0.15s; }
  .btn:active::after { opacity: 1; }
  .btn:active { transform: scale(0.97); }

  .btn-red { background: var(--red); color: white; box-shadow: 0 4px 20px rgba(229,9,20,0.35); }
  .btn-blue { background: var(--blue); color: white; box-shadow: 0 4px 20px rgba(30,144,255,0.3); }
  .btn-green { background: var(--green); color: #0D0D0D; box-shadow: 0 4px 20px rgba(46,204,113,0.3); }
  .btn-purple { background: var(--purple); color: white; box-shadow: 0 4px 20px rgba(155,89,182,0.3); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--gray); }
  .btn-ghost { background: rgba(255,255,255,0.05); color: var(--white); border: 1px solid var(--border); }
  .btn-sm { padding: 10px 18px; font-size: 14px; width: auto; border-radius: 9px; }
  .btn-disabled { opacity: 0.4; pointer-events: none; }

  /* ===== MODE CARDS ===== */
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 420px; margin: 10px 0; }
  .mode-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 18px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-card:active { transform: scale(0.96); }
  .mode-card.selected { border-color: var(--red); background: rgba(229,9,20,0.08); }
  .mode-card .mode-icon { font-size: 30px; display: block; margin-bottom: 6px; }
  .mode-card .mode-name { font-size: 14px; font-weight: 700; }
  .mode-card .mode-desc { font-size: 11px; color: var(--gray); margin-top: 3px; }

  /* ===== ROLES ===== */
  .roles-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .role-chip {
    padding: 7px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
    user-select: none;
  }
  .role-chip.off { background: #1a1a1a; border-color: var(--border); color: var(--gray); }
  .role-chip.on { border-color: currentColor; }
  .role-chip.evil { color: var(--red); }
  .role-chip.evil.on { background: rgba(229,9,20,0.12); }
  .role-chip.good { color: var(--blue); }
  .role-chip.good.on { background: rgba(30,144,255,0.12); }
  .role-chip.special { color: var(--purple); }
  .role-chip.special.on { background: rgba(155,89,182,0.12); }

  /* ===== PLAYERS LIST ===== */
  .player-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .player-item:last-child { border-bottom: none; }
  .player-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 900; flex-shrink: 0;
  }
  .player-name { font-size: 15px; font-weight: 600; margin-right: 10px; flex: 1; }
  .player-badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; }

  /* ===== ROLE REVEAL ===== */
  .role-reveal-card {
    background: #111;
    border-radius: 20px;
    padding: 30px 24px;
    text-align: center;
    width: 100%; max-width: 380px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .role-reveal-card::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0.04;
    background: repeating-linear-gradient(45deg, #fff 0, #fff 1px, transparent 0, transparent 50%);
    background-size: 10px 10px;
  }
  .role-big-icon { font-size: 64px; display: block; margin-bottom: 10px; filter: drop-shadow(0 0 16px currentColor); }
  .role-big-name { font-size: 28px; font-weight: 900; letter-spacing: 2px; }
  .role-big-desc { font-size: 14px; color: var(--gray); margin-top: 10px; line-height: 1.6; }
  .role-tip {
    margin-top: 16px; padding: 12px 16px; border-radius: 10px;
    background: rgba(255,255,255,0.04); font-size: 13px; color: var(--gray);
    border-right: 3px solid var(--purple);
  }

  /* ===== GAME ===== */
  .game-header {
    width: 100%; max-width: 420px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0 14px;
  }
  .round-badge {
    background: rgba(229,9,20,0.15); border: 1px solid rgba(229,9,20,0.3);
    border-radius: 8px; padding: 5px 12px; font-size: 13px; font-weight: 700; color: var(--red);
  }
  .phase-badge {
    font-size: 12px; color: var(--gray); background: #1a1a1a;
    padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border);
  }

  .timer-ring {
    width: 70px; height: 70px; position: relative;
  }
  .timer-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .timer-ring circle { fill: none; stroke-width: 4; }
  .timer-bg { stroke: #2a2a2a; }
  .timer-fill { stroke: var(--red); stroke-linecap: round; stroke-dasharray: 188; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.5s; }
  .timer-text {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: var(--white);
  }

  .players-voting { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 420px; }
  .vote-player {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 13px 16px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden;
  }
  .vote-player::before { content: ''; position: absolute; inset: 0; background: rgba(229,9,20,0); transition: background 0.2s; border-radius: 12px; }
  .vote-player.selected { border-color: var(--red); }
  .vote-player.selected::before { background: rgba(229,9,20,0.08); }
  .vote-player.eliminated { opacity: 0.3; pointer-events: none; }
  .vote-player.protected { border-color: var(--green); }
  .vote-player.protected::before { background: rgba(46,204,113,0.06); }
  .vote-count { font-size: 12px; padding: 4px 10px; border-radius: 6px; background: rgba(255,255,255,0.06); font-weight: 700; }

  /* ===== ABILITY BTN ===== */
  .ability-section {
    width: 100%; max-width: 420px;
    background: linear-gradient(135deg, rgba(155,89,182,0.1), rgba(229,9,20,0.1));
    border: 1px solid rgba(155,89,182,0.2);
    border-radius: 14px; padding: 14px 16px; margin: 8px 0;
  }
  .ability-row { display: flex; align-items: center; justify-content: space-between; }
  .ability-info { flex: 1; }
  .ability-name { font-size: 14px; font-weight: 700; color: var(--purple); }
  .ability-desc { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .ability-btn {
    padding: 10px 18px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, var(--purple), var(--red));
    color: white; font-family: 'Tajawal', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: all 0.18s; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(155,89,182,0.3);
  }
  .ability-btn:active { transform: scale(0.95); }
  .ability-btn.used { background: #2a2a2a; color: var(--gray); box-shadow: none; cursor: not-allowed; }

  /* ===== EVENTS LOG ===== */
  .events-log {
    width: 100%; max-width: 420px;
    background: #111; border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 14px; max-height: 130px; overflow-y: auto;
  }
  .event-item {
    padding: 5px 0; border-bottom: 1px solid #1e1e1e; font-size: 12px;
    color: var(--gray); display: flex; align-items: center; gap: 6px;
  }
  .event-item:last-child { border-bottom: none; }
  .event-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* ===== RESULT SCREEN ===== */
  .result-big {
    font-size: 72px; text-align: center; margin: 20px 0;
    animation: bounce-in 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
  }
  @keyframes bounce-in { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }

  .result-title { font-size: 30px; font-weight: 900; text-align: center; }
  .result-sub { color: var(--gray); text-align: center; font-size: 14px; margin-top: 6px; }

  .reveal-list { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 420px; }
  .reveal-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border-radius: 10px; padding: 12px 14px;
    border: 1px solid var(--border);
  }

  /* ===== SHARE ===== */
  .share-box {
    background: #111; border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; width: 100%; max-width: 420px;
    display: flex; align-items: center; gap: 10px;
  }
  .share-url { flex: 1; font-size: 13px; color: var(--blue); word-break: break-all; direction: ltr; }
  .copy-btn { background: rgba(30,144,255,0.15); border: 1px solid rgba(30,144,255,0.3); color: var(--blue); border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: 'Tajawal', sans-serif; }
  .copy-btn:active { background: rgba(30,144,255,0.3); }

  /* ===== ROOM CODE ===== */
  .room-code-display {
    text-align: center; letter-spacing: 10px; font-size: 34px; font-weight: 900;
    color: var(--blue); background: rgba(30,144,255,0.08); border: 1px solid rgba(30,144,255,0.2);
    border-radius: 12px; padding: 16px; width: 100%; max-width: 420px;
  }

  /* ===== WAITING ===== */
  .waiting-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--blue); margin: 0 3px;
    animation: blink 1.2s ease-in-out infinite;
  }
  .waiting-dot:nth-child(2) { animation-delay: 0.2s; }
  .waiting-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,100% { opacity: 0.2; } 50% { opacity: 1; } }

  /* ===== NOTIFICATION TOAST ===== */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: #1a1a1a; border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 20px; z-index: 9999; font-size: 14px; font-weight: 600;
    transition: transform 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    max-width: 340px; text-align: center; display: flex; align-items: center; gap: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.danger { border-color: rgba(229,9,20,0.4); color: #ff4d4d; }
  .toast.info { border-color: rgba(30,144,255,0.4); color: var(--blue); }
  .toast.success { border-color: rgba(46,204,113,0.4); color: var(--green); }

  /* ===== AI THINKING ===== */
  .ai-thinking {
    display: flex; align-items: center; gap: 8px; color: var(--purple); font-size: 13px;
    padding: 8px 14px; background: rgba(155,89,182,0.08); border-radius: 8px; border: 1px solid rgba(155,89,182,0.2);
  }
  .ai-spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== PHASE INDICATOR ===== */
  .phase-steps { display: flex; gap: 6px; justify-content: center; margin: 8px 0; }
  .phase-step { flex: 1; height: 4px; border-radius: 2px; background: var(--border); max-width: 80px; transition: background 0.3s; }
  .phase-step.active { background: var(--red); box-shadow: 0 0 8px rgba(229,9,20,0.5); }
  .phase-step.done { background: #444; }

  /* ===== AI PLAYERS ===== */
  .ai-badge { font-size: 10px; padding: 2px 7px; border-radius: 5px; background: rgba(155,89,182,0.2); color: var(--purple); font-weight: 700; border: 1px solid rgba(155,89,182,0.3); }

  /* TARGET MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px; backdrop-filter: blur(4px);
  }
  .modal-overlay.hidden { display: none; }
  .modal-box { background: #161616; border: 1px solid var(--border); border-radius: 18px; padding: 24px; width: 100%; max-width: 380px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; text-align: center; }
  .target-list { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; }
  .target-item { padding: 12px 14px; background: #1a1a1a; border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.15s; }
  .target-item:active { background: rgba(155,89,182,0.1); border-color: var(--purple); }
  .target-name { font-size: 15px; font-weight: 600; flex: 1; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .mt8 { margin-top: 8px; }
  .mt12 { margin-top: 12px; }
  .mt16 { margin-top: 16px; }
  .mt20 { margin-top: 20px; }
  .gap8 { gap: 8px; }
  .flex-col { display: flex; flex-direction: column; }
  .w100 { width: 100%; max-width: 420px; }
  .text-center { text-align: center; }
  .text-gray { color: var(--gray); }
  .text-small { font-size: 13px; }
  .text-red { color: var(--red); }
  .text-blue { color: var(--blue); }
  .text-green { color: var(--green); }
  .text-purple { color: var(--purple); }
  .fw700 { font-weight: 700; }
  .separator { width: 100%; height: 1px; background: var(--border); margin: 12px 0; max-width: 420px; }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ABILITY TARGET MODAL -->
<div class="modal-overlay hidden" id="targetModal">
  <div class="modal-box">
    <div class="modal-title" id="targetModalTitle">اختر لاعبًا</div>
    <div class="target-list" id="targetList"></div>
    <button class="btn btn-outline mt12" onclick="closeTargetModal()">إلغاء</button>
  </div>
</div>

<!-- ====================================================
     SCREEN: HOME
===================================================== -->
<div class="screen active" id="screen-home">
  <div class="logo">
    <span class="logo-icon">🎭</span>
    <div class="logo-title">وضع الشك</div>
    <div class="logo-sub">من تثق به؟ لا أحد</div>
  </div>

  <div class="mode-grid mt16">
    <div class="mode-card selected" onclick="selectMode('friend')" id="mode-friend">
      <span class="mode-icon">👥</span>
      <div class="mode-name">مع الأصدقاء</div>
      <div class="mode-desc">شارك الرابط</div>
    </div>
    <div class="mode-card" onclick="selectMode('ai')" id="mode-ai">
      <span class="mode-icon">🤖</span>
      <div class="mode-name">ضد الذكاء</div>
      <div class="mode-desc">لعب فردي</div>
    </div>
  </div>

  <div class="card mt8 w100">
    <div class="card-title">اسمك في اللعبة</div>
    <input type="text" id="playerNameInput" placeholder="أدخل اسمك..." maxlength="16">
  </div>

  <div class="flex-col gap8 w100 mt8" id="friendModeSection">
    <button class="btn btn-red" onclick="createRoom()">🚀 إنشاء روم جديد</button>
    <div style="display:flex;align-items:center;gap:8px;color:var(--gray);font-size:13px;">
      <div style="flex:1;height:1px;background:var(--border);"></div>أو<div style="flex:1;height:1px;background:var(--border);"></div>
    </div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="joinCodeInput" placeholder="كود الروم..." maxlength="6" style="text-align:center;letter-spacing:4px;font-size:18px;font-weight:900;">
      <button class="btn btn-blue btn-sm" onclick="joinRoom()">انضم</button>
    </div>
  </div>

  <div class="flex-col gap8 w100 mt8" id="aiModeSection" style="display:none;">
    <div class="card w100">
      <div class="card-title">عدد لاعبي الذكاء الاصطناعي</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-ghost btn-sm" onclick="setAICount(3)">3 🤖</button>
        <button class="btn btn-ghost btn-sm" onclick="setAICount(4)">4 🤖</button>
        <button class="btn btn-ghost btn-sm" onclick="setAICount(5)">5 🤖</button>
        <button class="btn btn-ghost btn-sm" onclick="setAICount(6)">6 🤖</button>
      </div>
      <div class="mt8 text-small text-gray" id="aiCountDisplay">الذكاء الاصطناعي: 4 لاعبين</div>
    </div>
    <button class="btn btn-purple" onclick="startAIGame()">🤖 ابدأ ضد الذكاء الاصطناعي</button>
  </div>

  <div class="text-center text-small text-gray mt16" style="max-width:340px;line-height:1.8;">
    لعبة خداع وتحليل • من 4 إلى 20 لاعب<br>
    اكشف المخادعين قبل أن يكشفوك 😈
  </div>
</div>

<!-- ====================================================
     SCREEN: LOBBY (Room Leader)
===================================================== -->
<div class="screen" id="screen-lobby">
  <div class="log
